name: release-artifacts

on:
  push:
    # Matches both v* tags (e.g. v1.0) and date-based tags (e.g. 2026.04.07)
    tags: ["v*", "20[0-9][0-9].*"]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          rm -rf ../src/api/static
          mv dist ../src/api/static

      - name: Build binary in Docker (CUDA 12.4)
        run: |
          docker build -t amumax-build .
          mkdir -p build
          docker run --rm -v "$PWD:/src" amumax-build
          chmod +x build/amumax
          cp build/amumax ./amumax

      - name: Download CUDA 12 libraries
        run: |
          # libcufft.so.12 — matches SONAME from CUDA 12.4 build
          curl -fSL https://developer.download.nvidia.com/compute/cuda/redist/libcufft/linux-x86_64/libcufft-linux-x86_64-12.1.0.31-archive.tar.xz -o libcufft.tar.xz
          tar -xJf libcufft.tar.xz
          cp -L libcufft-linux-x86_64-12.1.0.31-archive/lib/libcufft.so.12 ./libcufft.so.12

          # libcurand.so.10
          curl -fSL https://developer.download.nvidia.com/compute/cuda/redist/libcurand/linux-x86_64/libcurand-linux-x86_64-10.4.1.34-archive.tar.xz -o libcurand.tar.xz
          tar -xJf libcurand.tar.xz
          cp -L libcurand-linux-x86_64-10.4.1.34-archive/lib/libcurand.so.10 ./libcurand.so.10

          rm -rf libcufft-linux-x86_64-12.1.0.31-archive libcurand-linux-x86_64-10.4.1.34-archive
          rm libcufft.tar.xz libcurand.tar.xz

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            amumax
            libcufft.so.12
            libcurand.so.10
