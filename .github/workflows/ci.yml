name: release-artifacts

on:
  push:
    # Matches both v* tags (e.g. v1.0) and date-based tags (e.g. 2026.04.07)
    tags: ["v*", "20[0-9][0-9].*"]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
          rm -rf ../src/api/static
          mv dist ../src/api/static

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up CUDA build environment (libcufft.so.12 + libcurand.so.10)
        run: |
          mkdir -p /opt/cuda/include /opt/cuda/lib

          # cuda_cudart 12.4.99: provides cuda.h (driver API), cuda_runtime.h,
          #   and lib/stubs/libcuda.so for linking -lcuda
          curl -fSL https://developer.download.nvidia.com/compute/cuda/redist/cuda_cudart/linux-x86_64/cuda_cudart-linux-x86_64-12.4.99-archive.tar.xz \
            | tar -xJf - -C /tmp
          cp -r /tmp/cuda_cudart-linux-x86_64-12.4.99-archive/include/. /opt/cuda/include/
          cp    /tmp/cuda_cudart-linux-x86_64-12.4.99-archive/lib/stubs/libcuda.so /opt/cuda/lib/
          rm -rf /tmp/cuda_cudart*

          # libcufft 12.1.0.31 → SONAME: libcufft.so.12
          curl -fSL https://developer.download.nvidia.com/compute/cuda/redist/libcufft/linux-x86_64/libcufft-linux-x86_64-12.1.0.31-archive.tar.xz \
            | tar -xJf - -C /tmp
          cp -r /tmp/libcufft-linux-x86_64-12.1.0.31-archive/include/. /opt/cuda/include/
          cp    /tmp/libcufft-linux-x86_64-12.1.0.31-archive/lib/libcufft.so.12.1.0.31 /opt/cuda/lib/
          ln -sf libcufft.so.12.1.0.31 /opt/cuda/lib/libcufft.so.12
          ln -sf libcufft.so.12        /opt/cuda/lib/libcufft.so
          rm -rf /tmp/libcufft*

          # libcurand 10.4.1.34 → SONAME: libcurand.so.10
          curl -fSL https://developer.download.nvidia.com/compute/cuda/redist/libcurand/linux-x86_64/libcurand-linux-x86_64-10.4.1.34-archive.tar.xz \
            | tar -xJf - -C /tmp
          cp -r /tmp/libcurand-linux-x86_64-10.4.1.34-archive/include/. /opt/cuda/include/
          cp    /tmp/libcurand-linux-x86_64-10.4.1.34-archive/lib/libcurand.so.10.4.1.34 /opt/cuda/lib/
          ln -sf libcurand.so.10.4.1.34 /opt/cuda/lib/libcurand.so.10
          ln -sf libcurand.so.10        /opt/cuda/lib/libcurand.so
          rm -rf /tmp/libcurand*

          echo "=== /opt/cuda/lib ==="
          ls /opt/cuda/lib/

      - name: Build binary
        env:
          CGO_CFLAGS: "-I/opt/cuda/include"
          CGO_LDFLAGS: "-L/opt/cuda/lib -lcufft -lcuda -lcurand -Wl,-rpath -Wl,$ORIGIN"
          CGO_CFLAGS_ALLOW: "(-fno-schedule-insns|-malign-double|-ffast-math)"
        run: |
          mkdir -p build
          go build -v \
            -ldflags "-X github.com/MathieuMoalic/amumax/src/version.VERSION=$(date -u +'%Y.%m.%d')" \
            -o build/amumax
          echo "=== Binary SONAME check ==="
          ldd build/amumax | grep -E 'cufft|curand|cuda' || true
          cp build/amumax ./amumax
          chmod +x ./amumax

      - name: Prepare release CUDA libraries
        run: |
          # libcufft.so.12 — from the CDN install above
          cp /opt/cuda/lib/libcufft.so.12.1.0.31 ./libcufft.so.12

          # libcurand.so.10 — CDN archive only ships the versioned file, rename it
          cp /opt/cuda/lib/libcurand.so.10.4.1.34 ./libcurand.so.10

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            amumax
            libcufft.so.12
            libcurand.so.10
