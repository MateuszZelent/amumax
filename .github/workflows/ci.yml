name: release-artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30

      - name: Build
        run: |
          nix build .#default
          cp result/bin/amumax ./amumax
          chmod +x amumax

      - name: Download CUDA libraries
        run: |
          # Download and extract libcufft.so.11
          curl -fSL https://developer.download.nvidia.com/compute/cuda/redist/libcufft/linux-x86_64/libcufft-linux-x86_64-11.3.3.41-archive.tar.xz -o libcufft.tar.xz
          file libcufft.tar.xz
          tar -xJf libcufft.tar.xz
          cp -L libcufft-linux-x86_64-11.3.3.41-archive/lib/libcufft.so.11 ./libcufft.so.11
          
          # Download and extract libcurand.so.10 (libcurand doesn't have version 11)
          curl -fSL https://developer.download.nvidia.com/compute/cuda/redist/libcurand/linux-x86_64/libcurand-linux-x86_64-10.3.9.55-archive.tar.xz -o libcurand.tar.xz
          file libcurand.tar.xz
          tar -xJf libcurand.tar.xz
          cp -L libcurand-linux-x86_64-10.3.9.55-archive/lib/libcurand.so.10 ./libcurand.so.10
          
          # Clean up
          rm -rf libcufft-linux-x86_64-11.3.3.41-archive libcurand-linux-x86_64-10.3.9.55-archive
          rm libcufft.tar.xz libcurand.tar.xz

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            amumax
            libcufft.so.11
            libcurand.so.10
